# Pi-hole Watchdog configuration
# Installed to /etc/network-watchdog.conf
# Values here override the defaults baked into the watchdog script.
# This file is preserved across reinstalls, so edit it (not the script) to tune behavior.

# --- Core ---
# Minimum seconds between reboots this script will trigger (default: 1800 = 30 min).
#REBOOT_COOLDOWN=1800

# Domain used for the DNS resolution check (resolved via Pi-hole at 127.0.0.1).
#TEST_DOMAIN="google.com"

# --- Alert-only health checks (these never trigger a reboot) ---
# Warn when disk usage on / reaches this percentage.
#DISK_WARN_PCT=90

# Detect "FTL is up but upstream/internet DNS is dead" and alert (no reboot).
#ENABLE_UPSTREAM_CHECK=true

# --- Notifications (optional) ---
# Command run whenever the watchdog takes action or detects a problem.
# The message is available as the $MSG environment variable. Examples:
#   ntfy:   NOTIFY_CMD='curl -s -H "Title: Pi-hole watchdog" -d "$MSG" https://ntfy.sh/YOUR-TOPIC'
#   Slack:  NOTIFY_CMD='curl -s -X POST -H "Content-type: application/json" --data "{\"text\":\"$MSG\"}" https://hooks.slack.com/services/XXX'
#   email:  NOTIFY_CMD='printf "%s\n" "$MSG" | mail -s "Pi-hole watchdog" you@example.com'
#NOTIFY_CMD=''

# --- Dead-man's switch (optional) ---
# URL pinged after every successful run (e.g. a healthchecks.io check URL).
# If the watchdog ever stops running entirely, that service alerts you.
#HEARTBEAT_URL=''
