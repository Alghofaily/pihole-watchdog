# Pi-hole Watchdog configuration
# Installed to /etc/network-watchdog.conf
# Values here override the defaults baked into the watchdog script.
# This file is preserved across reinstalls, so edit it (not the script) to tune behavior.

# --- Core ---
# Minimum seconds between reboots this script will trigger (default: 1800 = 30 min).
#REBOOT_COOLDOWN=1800

# Domain used for the DNS resolution check (resolved via Pi-hole at 127.0.0.1).
#TEST_DOMAIN="google.com"

# Web UI health-check URL. Any 2xx/3xx (or auth-gated 401/403) response counts as
# "up". Change this if your admin UI lives elsewhere (e.g. Pi-hole v6 / custom port).
#WEBUI_URL="http://localhost/admin"

# Command used to restart Pi-hole's DNS engine. Docker users, point this at your
# container, e.g. FTL_RESTART_CMD="docker restart pihole".
#FTL_RESTART_CMD="systemctl restart pihole-FTL"

# --- Alert de-duplication ---
# The same alert-only condition won't notify again until this many seconds pass
# (default: 3600 = 1h). A one-shot "resolved" is sent when the condition clears.
#ALERT_COOLDOWN=3600

# --- Alert-only health checks (these never trigger a reboot) ---
# Warn when disk usage on / reaches this percentage.
#DISK_WARN_PCT=90

# Memory: warn when available RAM drops below this %, or swap used exceeds this %.
#ENABLE_MEM_CHECK=true
#MEM_WARN_PCT=10
#SWAP_WARN_PCT=50

# Temperature: warn above this CPU temperature in C (Raspberry Pi only).
#TEMP_WARN_C=80

# Pi-hole blocking enabled + gravity (blocklists) freshness.
#ENABLE_BLOCKING_CHECK=true
#GRAVITY_MAX_AGE_DAYS=14

# Warn when the system clock is not NTP-synchronized (breaks DNSSEC/TLS).
#ENABLE_TIME_CHECK=true

# Warn on storage I/O errors in the kernel log (early SD-card failure signal).
#ENABLE_IO_CHECK=true

# WiFi: warn when the signal is weaker than this many dBm (e.g. -80 is weaker than -75).
#RSSI_WARN_DBM=-75

# DHCP: when Pi-hole serves DHCP, warn if nothing is listening on UDP/67.
#ENABLE_DHCP_CHECK=true

# IPv6: alert (never reboot) when the IPv6 default gateway is unreachable.
#ENABLE_IPV6_CHECK=true

# Detect "FTL is up but upstream/internet DNS is dead" and alert (no reboot).
#ENABLE_UPSTREAM_CHECK=true

# Optionally restart a local recursive resolver (e.g. unbound) before alerting on
# a dead upstream. Off by default. Set both to enable.
#ENABLE_UPSTREAM_RESTART=false
#UPSTREAM_RESTART_CMD="systemctl restart unbound"

# --- Recovery storm escalation ---
# If soft fixes (network / FTL restarts) fire SOFTFIX_ESCALATE times within
# SOFTFIX_WINDOW seconds, send a distinct "recurring instability" alert.
#SOFTFIX_WINDOW=3600
#SOFTFIX_ESCALATE=3

# --- Notifications (optional) ---
# Command run whenever the watchdog takes action or detects a problem.
# The message is available as the $MSG environment variable. Examples:
#   ntfy:   NOTIFY_CMD='curl -s -H "Title: Pi-hole watchdog" -d "$MSG" https://ntfy.sh/YOUR-TOPIC'
#   Slack:  NOTIFY_CMD='curl -s -X POST -H "Content-type: application/json" --data "{\"text\":\"$MSG\"}" https://hooks.slack.com/services/XXX'
#   email:  NOTIFY_CMD='printf "%s\n" "$MSG" | mail -s "Pi-hole watchdog" you@example.com'
#NOTIFY_CMD=''

# --- Dead-man's switch (optional) ---
# URL pinged after every successful run (e.g. a healthchecks.io check URL).
# If the watchdog ever stops running entirely, that service alerts you.
#HEARTBEAT_URL=''
